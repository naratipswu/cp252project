name: Performance Testing (Matrix)

on:
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sunday
  workflow_dispatch:

jobs:
  performance-matrix:
    name: 📊 Performance Test - ${{ matrix.endpoint }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        endpoint: [homepage, cameras, search, admin]
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: camera_rental
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d camera_rental"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🚀 Start Server
        run: |
          nohup npm start > /tmp/server.log 2>&1 &
          sleep 5
        env:
          NODE_ENV: production
          SESSION_SECRET: ci-only-change-me
          DB_DIALECT: postgres
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: camera_rental
          DB_USER: postgres
          DB_PASSWORD: postgres
          ADMIN_USERNAME: admin
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: admin12345678

      - name: ⏳ Wait for server
        run: |
          npx wait-on http://localhost:3000 --timeout 60000 || (cat /tmp/server.log && exit 1)

      - name: 📊 Run Performance Test - ${{ matrix.endpoint }}
        run: |
          echo "Testing endpoint: ${{ matrix.endpoint }}"
          npm run profile -- ${{ matrix.endpoint }}
        continue-on-error: true

      - name: 📤 Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ matrix.endpoint }}
          path: performance/results/
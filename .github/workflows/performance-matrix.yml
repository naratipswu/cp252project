name: ⚡ Performance Testing (Matrix)

on:
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sunday
  workflow_dispatch:

jobs:
  performance-matrix:
    name: 📊 Performance Test - ${{ matrix.endpoint }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        endpoint: [homepage, cameras, search, admin]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🚀 Start Server
        run: npm start &

      - name: ⏳ Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: 📊 Run Performance Test - ${{ matrix.endpoint }}
        run: |
          echo "Testing endpoint: ${{ matrix.endpoint }}"
          npm run profile
        continue-on-error: true

      - name: 📤 Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ matrix.endpoint }}
          path: performance/results/

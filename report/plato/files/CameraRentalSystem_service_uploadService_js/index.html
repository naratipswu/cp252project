    <textarea id="file-source" class="col-md-12">const fs = require(&#039;fs&#039;);
const path = require(&#039;path&#039;);
const crypto = require(&#039;crypto&#039;);
const multer = require(&#039;multer&#039;);

const UPLOAD_CATEGORIES = [&#039;products&#039;, &#039;website&#039;, &#039;slips&#039;, &#039;avatars&#039;, &#039;others&#039;];
const PUBLIC_DIR = path.join(__dirname, &#039;..&#039;, &#039;public&#039;);
const UPLOADS_DIR = path.join(PUBLIC_DIR, &#039;uploads&#039;);

function ensureUploadDirectories() {
  if (!fs.existsSync(PUBLIC_DIR)) fs.mkdirSync(PUBLIC_DIR, { recursive: true });
  if (!fs.existsSync(UPLOADS_DIR)) fs.mkdirSync(UPLOADS_DIR, { recursive: true });
  UPLOAD_CATEGORIES.forEach((category) =&gt; {
    const target = path.join(UPLOADS_DIR, category);
    if (!fs.existsSync(target)) fs.mkdirSync(target, { recursive: true });
  });
}

function normalizeBaseName(name) {
  return String(name || &#039;file&#039;)
    .toLowerCase()
    .replace(/[^a-z0-9_-]/g, &#039;-&#039;)
    .replace(/-+/g, &#039;-&#039;)
    .replace(/^-|-$/g, &#039;&#039;)
    .slice(0, 50) || &#039;file&#039;;
}

const storage = multer.diskStorage({
  destination(req, file, cb) {
    const category = UPLOAD_CATEGORIES.includes(req.body.category) ? req.body.category : &#039;others&#039;;
    cb(null, path.join(UPLOADS_DIR, category));
  },
  filename(req, file, cb) {
    const ext = path.extname(file.originalname || &#039;&#039;).toLowerCase() || &#039;.jpg&#039;;
    const base = normalizeBaseName(path.basename(file.originalname || &#039;file&#039;, ext));
    const stamp = new Date().toISOString().replace(/[:.]/g, &#039;-&#039;);
    const rand = crypto.randomBytes(4).toString(&#039;hex&#039;);
    cb(null, `${base}-${stamp}-${rand}${ext}`);
  }
});

function getDirectoryStructure(dirPath = UPLOADS_DIR, prefix = &#039;&#039;) {
  if (!fs.existsSync(dirPath)) return &#039;Directory not found&#039;;
  
  let result = &#039;&#039;;
  const items = fs.readdirSync(dirPath).filter(f =&gt; !f.startsWith(&#039;.&#039;));
  
  items.forEach((item, index) =&gt; {
    const isLast = index === items.length - 1;
    const itemPath = path.join(dirPath, item);
    const stats = fs.statSync(itemPath);
    
    result += `${prefix}${isLast ? &#039;└── &#039; : &#039;├── &#039;}${item}\n`;
    
    if (stats.isDirectory()) {
      result += getDirectoryStructure(itemPath, `${prefix}${isLast ? &#039;    &#039; : &#039;│   &#039;}`);
    }
  });
  
  if (prefix === &#039;&#039; &amp;&amp; result === &#039;&#039;) return &#039;(empty)&#039;;
  return result;
}


const uploadImage = multer({
  storage,
  limits: { fileSize: 10 * 1024 * 1024 },
  fileFilter(req, file, cb) {
    const allowedMimeTypes = [&#039;image/jpeg&#039;, &#039;image/png&#039;, &#039;image/webp&#039;, &#039;image/gif&#039;];
    const ext = path.extname(file.originalname || &#039;&#039;).toLowerCase();
    const allowedExtensions = [&#039;.jpg&#039;, &#039;.jpeg&#039;, &#039;.png&#039;, &#039;.webp&#039;, &#039;.gif&#039;];
    if (!allowedMimeTypes.includes(file.mimetype) || !allowedExtensions.includes(ext)) {
      return cb(new Error(&#039;Only image files are allowed&#039;));
    }
    return cb(null, true);
  }
});

module.exports = {
  UPLOAD_CATEGORIES,
  UPLOADS_DIR,
  ensureUploadDirectories,
  uploadImage,
  getDirectoryStructure
};
